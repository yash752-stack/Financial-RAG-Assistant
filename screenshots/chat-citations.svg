  <text x="145" y="415" fill="#EDE8F5" font-size="24" font-family="Arial">• Margin pressure appears tied to rising input costs</text>
  <text x="145" y="455" fill="#EDE8F5" font-size="24" font-family="Arial">• Key risks include regulation, macro slowdown, and supply chain volatility</text>
  <text x="145" y="495" fill="#EDE8F5" font-size="24" font-family="Arial">• Management still guides for stable long-term cash generation</text>
